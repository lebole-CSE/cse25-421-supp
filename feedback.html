<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Feedback - Blossom With Candell</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Blossom With Candell</h1>
        <p>We value your feedback.</p>
    
        <nav>
            <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="service.html">Services</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="packages.html">Packages and Pricing</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact Us</a></li>
            <li><a href="feedback.html">Feedback</a></li>
            </ul>
        </nav>
        
    </header>

    <main>

        <section>
            <h2>Customer Feedback Form</h2>

            <p>
                Thank you for choosing Blossom With Candell.
                Please share your experience with us.
            </p>

            <form>

                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email"><br><br>

                <label for="rating">Rating:</label><br>
                <select id="rating" name="rating">
                    <option value="5">Excellent</option>
                    <option value="4">Very Good</option>
                    <option value="3">Good</option>
                    <option value="2">Fair</option>
                    <option value="1">Poor</option>
                </select><br><br>

                <label for="comments">Comments:</label><br>
                <textarea id="comments" name="comments" rows="5" cols="40"
                    placeholder="Tell us about your experience..."></textarea><br><br>

                <button type="submit">Submit Feedback</button>

            </form>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Blossom With Candell</p>
    </footer>

</body>

</html>
